      function loadScript(src, isAsync, onLoad, onerror) {
  const js = document.createElement("script");
  js.src = src;
  js.async = isAsync;
  js.onerror = function () {
    handleLoadScriptError(src);
    console.error("Failed to load script " + src);

      window.__cdnAssetPath = function () {
        return '/';
      };
    }
    
    if (onerror && !src.endsWith("pay.js")) {
      console.error("window.__Retry ");
      onerror();
      onLoad();
    }

  };
  if (onLoad) {
    js.onload = onLoad;
  }
  document.head.appendChild(js);
}
